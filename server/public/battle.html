<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>末日废墟 - 战斗</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #0a0a1a, #1a1a3e); color: #e0e0e0; min-height: 100vh; }

    .header { background: rgba(0,0,0,0.5); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .header h1 { font-size: 18px; color: #ff4444; letter-spacing: 2px; }
    .header a { color: #aaa; text-decoration: none; font-size: 13px; }

    .content { max-width: 1200px; margin: 0 auto; padding: 20px; }

    /* 战斗场景 */
    .battle-scene { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 24px; margin-bottom: 24px; display: none; }
    .battle-scene.active { display: block; }

    .field { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 20px; }
    .team { flex: 1; }
    .team-label { font-size: 14px; font-weight: bold; margin-bottom: 8px; padding: 4px 12px; border-radius: 4px; display: inline-block; }
    .team-label.attacker { background: rgba(68,255,68,0.15); color: #66ff66; }
    .team-label.defender { background: rgba(255,68,68,0.15); color: #ff6666; }

    .unit-card {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 10px; margin-bottom: 8px; transition: all 0.3s;
    }
    .unit-card.dead { opacity: 0.3; }
    .unit-card.acting { border-color: #ffd700; box-shadow: 0 0 10px rgba(255,215,0,0.3); }
    .unit-name { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
    .unit-hp-bar { background: rgba(255,255,255,0.1); border-radius: 4px; height: 8px; overflow: hidden; margin-bottom: 4px; }
    .unit-hp-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
    .unit-hp-fill.high { background: linear-gradient(90deg, #44ff44, #22cc22); }
    .unit-hp-fill.mid { background: linear-gradient(90deg, #ffaa00, #ff8800); }
    .unit-hp-fill.low { background: linear-gradient(90deg, #ff4444, #cc0000); }
    .unit-stats { font-size: 11px; color: #999; display: flex; gap: 8px; }
    .unit-effects { margin-top: 4px; display: flex; gap: 4px; flex-wrap: wrap; }
    .effect-tag { font-size: 10px; padding: 1px 6px; border-radius: 3px; }
    .effect-tag.buff { background: rgba(68,255,68,0.2); color: #66ff66; }
    .effect-tag.debuff { background: rgba(255,68,68,0.2); color: #ff6666; }
    .effect-tag.control { background: rgba(128,0,255,0.2); color: #aa66ff; }

    /* 战斗日志 */
    .battle-log { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 16px; max-height: 300px; overflow-y: auto; margin-bottom: 16px; }
    .log-entry { font-size: 13px; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .log-turn { color: #ffd700; font-weight: bold; margin-top: 8px; }
    .log-damage { color: #ff6666; }
    .log-heal { color: #66ff66; }
    .log-effect { color: #aa66ff; }
    .log-kill { color: #ff0000; font-weight: bold; }
    .log-crit { color: #ffaa00; font-weight: bold; }

    /* 战斗结果 */
    .battle-result { text-align: center; padding: 40px; display: none; }
    .battle-result.active { display: block; }
    .result-title { font-size: 32px; font-weight: bold; margin-bottom: 16px; }
    .result-title.win { color: #ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.5); }
    .result-title.lose { color: #ff4444; }
    .result-stats { font-size: 16px; color: #aaa; margin-bottom: 20px; }
    .result-rewards { background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.3); border-radius: 8px; padding: 16px; display: inline-block; }
    .result-rewards div { margin: 4px 0; }

    /* 编队和选择 */
    .setup-panel { margin-bottom: 24px; }
    .panel-title { font-size: 16px; color: #ff4444; margin-bottom: 12px; letter-spacing: 2px; }

    .hero-select { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .hero-option {
      background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 10px; cursor: pointer; transition: all 0.3s; min-width: 120px;
    }
    .hero-option:hover { border-color: rgba(255,68,68,0.5); }
    .hero-option.selected { border-color: #ffd700; background: rgba(255,215,0,0.1); }
    .hero-option .name { font-weight: bold; font-size: 13px; }
    .hero-option .info { font-size: 11px; color: #888; margin-top: 4px; }

    .stage-select { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .stage-card {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 14px; cursor: pointer; transition: all 0.3s;
    }
    .stage-card:hover { border-color: rgba(255,68,68,0.5); transform: translateY(-2px); }
    .stage-card.selected { border-color: #ffd700; background: rgba(255,215,0,0.1); }
    .stage-name { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
    .stage-info { font-size: 12px; color: #888; }
    .stage-difficulty { display: inline-block; font-size: 11px; padding: 1px 8px; border-radius: 3px; margin-top: 4px; }
    .diff-easy { background: rgba(68,255,68,0.2); color: #66ff66; }
    .diff-normal { background: rgba(255,255,68,0.2); color: #ffff66; }
    .diff-hard { background: rgba(255,128,0,0.2); color: #ff8800; }
    .diff-hell { background: rgba(255,68,68,0.2); color: #ff6666; }

    .btn-battle {
      background: linear-gradient(135deg, #ff4444, #cc0000); color: #fff; border: none;
      padding: 14px 40px; border-radius: 8px; font-size: 18px; font-weight: bold;
      cursor: pointer; letter-spacing: 4px; transition: all 0.3s;
    }
    .btn-battle:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255,68,68,0.4); }
    .btn-battle:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .speed-controls { display: flex; gap: 8px; margin-bottom: 16px; }
    .speed-btn {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: #aaa; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    .speed-btn.active { background: rgba(255,68,68,0.2); border-color: #ff4444; color: #ff6666; }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚔️ 战斗</h1>
    <a href="main.html">← 返回主城</a>
  </div>

  <div class="content">
    <!-- 编队面板 -->
    <div class="setup-panel" id="setupPanel">
      <div class="panel-title">📋 选择副本</div>
      <div class="stage-select" id="stageList"></div>

      <div class="panel-title" style="margin-top:20px">🦸 选择英雄（最多6个）</div>
      <div class="hero-select" id="heroSelect"></div>

      <div style="text-align:center; margin-top:20px">
        <button class="btn-battle" id="startBtn" onclick="startBattle()" disabled>⚔️ 开始战斗</button>
      </div>
    </div>

    <!-- 战斗场景 -->
    <div class="battle-scene" id="battleScene">
      <div class="speed-controls">
        <button class="speed-btn active" onclick="setSpeed(1)">1x</button>
        <button class="speed-btn" onclick="setSpeed(2)">2x</button>
        <button class="speed-btn" onclick="setSpeed(5)">5x</button>
        <button class="speed-btn" onclick="setSpeed(0)">跳过</button>
      </div>
      <div class="field">
        <div class="team"><div class="team-label attacker">进攻方</div><div id="attackerUnits"></div></div>
        <div class="team"><div class="team-label defender">防守方</div><div id="defenderUnits"></div></div>
      </div>
      <div class="battle-log" id="battleLog"></div>
    </div>

    <!-- 战斗结果 -->
    <div class="battle-result" id="battleResult">
      <div class="result-title" id="resultTitle"></div>
      <div class="result-stats" id="resultStats"></div>
      <div class="result-rewards" id="resultRewards"></div>
      <div style="margin-top:20px">
        <button class="btn-battle" onclick="location.reload()">再来一局</button>
      </div>
    </div>
  </div>

<script>
const API = window.location.origin;
const token = new URLSearchParams(location.search).get('token') || localStorage.getItem('token') || '';

let selectedStage = null;
let selectedHeroes = [];
let myHeroes = [];
let battleSpeed = 1;
let battleData = null;

const FACTION_MAP = {red:'红系',blue:'蓝系',green:'绿系',yellow:'黄系',light:'光系',dark:'暗系',god:'神系'};
const CLASS_MAP = {assassin:'刺客',mage:'法师',tank:'坦克',warrior:'战士',healer:'奶妈'};
const DIFF_MAP = {easy:'简单',normal:'普通',hard:'困难',hell:'地狱'};

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token } };
  if (body) opts.body = JSON.stringify(body);
  return (await fetch(API + path, opts)).json();
}

async function init() {
  const [heroesRes, stagesRes] = await Promise.all([
    api('GET', '/api/hero/list'),
    api('GET', '/api/battle/stages')
  ]);

  if (heroesRes.success) {
    myHeroes = heroesRes.data;
    renderHeroSelect();
  }

  if (stagesRes.success) {
    renderStages(stagesRes.data);
  }
}

function renderStages(stages) {
  document.getElementById('stageList').innerHTML = stages.map(s => `
    <div class="stage-card" onclick="selectStage('${s.id}', this)">
      <div class="stage-name">${s.chapter}-${s.stage} ${s.name}</div>
      <div class="stage-info">Lv.${s.requiredLevel} | ${s.enemies.length}个敌人 | 💰${s.rewards.gold}</div>
      <span class="stage-difficulty diff-${s.difficulty}">${DIFF_MAP[s.difficulty] || s.difficulty}</span>
    </div>
  `).join('');
}

function renderHeroSelect() {
  if (myHeroes.length === 0) {
    document.getElementById('heroSelect').innerHTML = '<div style="color:#666">还没有英雄，请先去主城召唤</div>';
    return;
  }
  document.getElementById('heroSelect').innerHTML = myHeroes.map(h => `
    <div class="hero-option" onclick="toggleHero('${h.instanceId}', this)" data-id="${h.instanceId}">
      <div class="name">${h.heroId.replace(/hero_\w+_/,'')}</div>
      <div class="info">Lv.${h.level} ❤️${h.stats.hp} ⚔️${h.stats.atk}</div>
    </div>
  `).join('');
}

function selectStage(id, el) {
  selectedStage = id;
  document.querySelectorAll('.stage-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  checkReady();
}

function toggleHero(id, el) {
  const idx = selectedHeroes.indexOf(id);
  if (idx >= 0) {
    selectedHeroes.splice(idx, 1);
    el.classList.remove('selected');
  } else if (selectedHeroes.length < 6) {
    selectedHeroes.push(id);
    el.classList.add('selected');
  }
  checkReady();
}

function checkReady() {
  document.getElementById('startBtn').disabled = !(selectedStage && selectedHeroes.length > 0);
}

async function startBattle() {
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = '战斗中...';

  const res = await api('POST', '/api/battle/pve/start', {
    stageId: selectedStage,
    heroInstanceIds: selectedHeroes
  });

  if (res.success) {
    battleData = res.data;
    playBattle(res.data);
  } else {
    alert('战斗失败: ' + res.error);
    btn.disabled = false;
    btn.textContent = '⚔️ 开始战斗';
  }
}

async function playBattle(data) {
  document.getElementById('setupPanel').style.display = 'none';
  document.getElementById('battleScene').classList.add('active');

  const allUnits = extractUnits(data);

  // 渲染初始单位
  renderUnits(allUnits);

  // 逐回合播放
  for (const turn of data.turns) {
    if (battleSpeed === 0) continue; // 跳过

    addLog(`<div class="log-turn">━━━ 第 ${turn.turnNumber} 回合 ━━━</div>`);

    for (const action of turn.actions) {
      if (battleSpeed > 0) {
        await sleep(battleSpeed === 1 ? 800 : battleSpeed === 2 ? 400 : 150);
      }

      // 高亮行动单位
      highlightUnit(action.actorId);

      if (action.skipped) {
        addLog(`<div class="log-entry">${action.actorName} 因${action.skipReason}无法行动</div>`);
      } else {
        let logStr = `<div class="log-entry">${action.actorName} 使用 <b>${action.skillName}</b>`;
        for (const t of action.targets) {
          if (t.damage) {
            logStr += ` → ${t.targetName} <span class="log-damage">-${t.damage}</span>`;
            if (t.isCritical) logStr += ` <span class="log-crit">暴击!</span>`;
            if (t.killed) logStr += ` <span class="log-kill">击杀!</span>`;
          }
          if (t.heal) logStr += ` → ${t.targetName} <span class="log-heal">+${t.heal}</span>`;
          if (t.effects?.length) logStr += ` <span class="log-effect">[${t.effects.join(',')}]</span>`;
        }
        logStr += '</div>';
        addLog(logStr);
      }

      // 更新血量
      updateUnitStates(allUnits, turn);
    }
  }

  // 显示结果
  showResult(data);
}

function extractUnits(data) {
  const units = [];
  for (const turn of data.turns) {
    for (const action of turn.actions) {
      for (const t of action.targets) {
        if (!units.find(u => u.id === t.targetId)) {
          units.push({ id: t.targetId, name: t.targetName, team: t.targetId.startsWith('enemy') ? 'defender' : 'attacker' });
        }
      }
      if (!units.find(u => u.id === action.actorId)) {
        units.push({ id: action.actorId, name: action.actorName, team: action.actorId.startsWith('enemy') ? 'defender' : 'attacker' });
      }
    }
  }
  return units;
}

function renderUnits(units) {
  const atkUnits = units.filter(u => u.team === 'attacker');
  const defUnits = units.filter(u => u.team === 'defender');

  const renderTeam = (list) => list.map(u => `
    <div class="unit-card" id="unit-${u.id}">
      <div class="unit-name">${u.name}</div>
      <div class="unit-hp-bar"><div class="unit-hp-fill high" style="width:100%"></div></div>
      <div class="unit-stats"><span>❤️ 100%</span></div>
    </div>
  `).join('');

  document.getElementById('attackerUnits').innerHTML = renderTeam(atkUnits);
  document.getElementById('defenderUnits').innerHTML = renderTeam(defUnits);
}

function highlightUnit(id) {
  document.querySelectorAll('.unit-card').forEach(c => c.classList.remove('acting'));
  const el = document.getElementById('unit-' + id);
  if (el) el.classList.add('acting');
}

function updateUnitStates(allUnits, turn) {
  // 简化：从战斗日志推断血量
  for (const action of turn.actions) {
    for (const t of action.targets) {
      const el = document.getElementById('unit-' + t.targetId);
      if (!el) continue;
      if (t.killed) el.classList.add('dead');
    }
  }
}

function addLog(html) {
  const log = document.getElementById('battleLog');
  log.innerHTML += html;
  log.scrollTop = log.scrollHeight;
}

function showResult(data) {
  document.getElementById('battleScene').classList.remove('active');
  const result = document.getElementById('battleResult');
  result.classList.add('active');

  const isWin = data.winner === 'attacker';
  document.getElementById('resultTitle').textContent = isWin ? '🎉 胜利！' : '💀 战败';
  document.getElementById('resultTitle').className = 'result-title ' + (isWin ? 'win' : 'lose');

  document.getElementById('resultStats').textContent = `战斗${data.totalTurns}回合 | 耗时${(data.duration / 1000).toFixed(1)}秒`;

  if (data.rewards) {
    document.getElementById('resultRewards').innerHTML = `
      <div>✨ 经验 +${data.rewards.exp}</div>
      <div>💰 金币 +${data.rewards.gold}</div>
    `;
  } else {
    document.getElementById('resultRewards').innerHTML = '<div>无奖励</div>';
  }
}

function setSpeed(s) {
  battleSpeed = s;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

init();
</script>
</body>
</html>
